name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run pytest with coverage
        # The conftest mocks Home Assistant entirely, so no HA install is needed.
        # PYTEST_DISABLE_PLUGIN_AUTOLOAD keeps the environment deterministic and
        # matches local development on Windows. asyncio and pytest_cov must
        # therefore be loaded explicitly via -p.
        # --cov-fail-under=80 acts as a guardrail (baseline ~86 % at time of
        # introduction) — raise it when fresh tests genuinely lift the floor.
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          pytest tests/ -p asyncio -p pytest_cov -v \
            --cov=custom_components/geosphere_austria_plus \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        # Only from the Python 3.13 matrix entry to avoid double-counting.
        # Public-repo uploads work without a token but may get rate-limited
        # — add CODECOV_TOKEN as a repo secret if uploads start being rejected.
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false  # token-less uploads can transiently fail; don't break CI

      - name: Upload coverage XML artifact (fallback debugging)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
